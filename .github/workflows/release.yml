name: Package Addon for WowUp
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}
          
      - name: Create Zip Archive
        run: |
          mkdir staging_dir
          
          cp -r "Created Addons"/* staging_dir/
          cp -r "Updated Addons"/* staging_dir/
          
          cd staging_dir
          zip -r "../MsAP-${{ github.event.release.tag_name }}-classic.zip" .
          
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: "MsAP-${{ github.event.release.tag_name }}-classic.zip"

      - name: Update CHANGELOG.md
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "$RELEASE_BODY" > new_entry.md
          echo "" >> new_entry.md
          
          if [ -f CHANGELOG.md ]; then
            echo "---------" >> new_entry.md
            echo "" >> new_entry.md
            cat CHANGELOG.md >> new_entry.md
          fi
          
          mv new_entry.md CHANGELOG.md
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add CHANGELOG.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update CHANGELOG.md for $RELEASE_TAG [skip ci]" && git push)